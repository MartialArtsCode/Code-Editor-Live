<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Browser IDE</title>
    
    <style>
      
      body{
        margin:0;
        height:100vh;
        display:grid;
        grid-template-columns:220px 1fr 1fr;
        font-family:sans-serif;
        background:#1e1e1e;
        color:white;
      }
      
      #navigator{
        background:#111;
        padding:10px;
        overflow:auto;
      }
      
      #editor{
        height:100%;
      }
      
      #preview{
        border:none;
        width:100%;
        height:100%;
        background:white;
      }
      
      #modeBar{
        position:absolute;
        top:10px;
        right:10px;
        z-index:10;
      }
      
      button{
        display:block;
        width:100%;
        margin-bottom:5px;
      }
      
      canvas{
        position:absolute;
        bottom:0;
        right:0;
        width:300px;
        height:200px;
        background:#000;
      }

    </style>

  </head>

  <body>

    <div id="navigator"></div>

    <div id="editor"></div>

    <iframe id="preview"></iframe>

    <canvas id="graph"></canvas>

    <div id="modeBar">
      <select id="modeSelector">
        <option value="monolithic">Monolithic</option>
        <option value="modular">Modular</option>
        <option value="fullstack">Fullstack</option>
      </select>
    </div>
    
    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

    <script type="module">

      import "./core/projectManager.js"
        import "./core/renderer.js"
          import "./core/modeController.js"
            
      import "./ui/editorPanel.js"
        import "./ui/fileNavigator.js"

      
      import "./visualization/dependencyGraph.js"
        import "./backend/mockServer.js"

    </script>

  </body>
</html>
