<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">   
  <title>Web IDE</title>
    
    <style>
      body{
        margin:0;
        display:grid;
        grid-template-columns:250px 1fr 1fr;
        height:100vh;
        font-family:sans-serif;
      }
      
      #navigator{
        background:#111;
        color:white;
        padding:10px;
      }
      
      #editor{
        tab-size: 4;
        white-space: pre;
        width:100%;
        height:100%;
        border:none;
        font-family:monospace;
      }

      #preview{
        width:100%;
        height:100%;
        border:none;
      }
    </style>
  </head>
  
  <body>
    
    <div id="navigator"></div>
    
    <div id="editor"></div>
    
    <iframe id="preview"></iframe>

    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js">
      require.config({
        paths: {
          vs: "https://unpkg.com/monaco-editor@0.45.0/min/vs"
        }
      });

      require(["vs/editor/editor.main"], function () {

        window.editor = monaco.editor.create(document.getElementById("editor"), {

          value: '<h1>Hello World<h1>
            
      console.log("Editor Ready")
    
            language: "html",

            theme: "vs-dark",

            automaticLayout: true,

            tabSize: 4,

            insertSpaces: true,

            minimap: {
                enabled: true
                
            }
    
         });
    
    });
          

    <script type="module">

      import "./core/projectManager.js"
      import "./core/modeController.js"
      import "./ui/editorPanel.js"
      import "./ui/fileNavigator.js"
      import "./core/renderer.js"
      import "./visualization/dependencyGraph.js"
      import "./backend/mockServer.js"
    
    </script>
  
  </body>
</html>
